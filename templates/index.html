<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Enquiry Processor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #0f1117;
    --paper:     #f5f2eb;
    --cream:     #ede9df;
    --accent:    #c8552a;
    --accent2:   #2a6b8a;
    --gold:      #b89a4e;
    --muted:     #6b6760;
    --border:    #d9d4c8;
    --urgent:    #c8552a;
    --high:      #b89a4e;
    --medium:    #2a6b8a;
    --low:       #5a7a55;
    --card-bg:   #ffffff;
    --shadow:    0 2px 16px rgba(15,17,23,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    border-bottom: 3px solid var(--accent);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
  }
  .logo-mark {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    color: var(--paper);
  }
  .logo-tag {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 2px 7px;
    border-radius: 2px;
  }
  .header-right {
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }

  /* ── Panel / Card ────────────────────────────────────────── */
  .panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .panel-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--cream);
  }
  .panel-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
  }
  .panel-body { padding: 1.5rem; }

  /* ── Input form ──────────────────────────────────────────── */
  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    padding: 0.85rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    line-height: 1.65;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--paper);
    color: var(--ink);
    resize: vertical;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent2); }

  .char-count {
    text-align: right;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.35rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 5px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    justify-content: center;
    margin-top: 1rem;
  }
  .btn-primary:hover:not(:disabled) { background: #a8431f; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 0.78rem;
    padding: 0.4rem 0.9rem;
  }
  .btn-ghost:hover { background: var(--cream); }

  /* ── Sample pills ────────────────────────────────────────── */
  .samples { margin-bottom: 1.25rem; }
  .samples-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .pill-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .pill {
    font-size: 0.72rem;
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--cream);
    color: var(--muted);
    font-weight: 500;
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); background: #fdf0ec; }

  /* ── Loading ─────────────────────────────────────────────── */
  #loading {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ─────────────────────────────────────────── */
  #empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }

  /* ── Results ─────────────────────────────────────────────── */
  #results { display: none; }

  /* Category badge */
  .category-hero {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
  }
  .category-badge {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    flex: 1;
  }
  .priority-chip {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
    color: #fff;
  }
  .priority-urgent { background: var(--urgent); }
  .priority-high    { background: var(--high); color: #fff; }
  .priority-medium  { background: var(--medium); }
  .priority-low     { background: var(--low); }

  /* Meta row */
  .meta-row {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: #fafaf8;
  }
  .meta-item { font-size: 0.78rem; color: var(--muted); }
  .meta-item strong { color: var(--ink); font-weight: 600; }

  /* Confidence bar */
  .conf-wrap {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .conf-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .conf-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .conf-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    background: var(--accent2);
  }
  .conf-reason { font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; }

  /* Sections */
  .result-section { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
  .result-section:last-child { border-bottom: none; }
  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }
  .result-section p { font-size: 0.875rem; }
  .key-points { list-style: none; }
  .key-points li {
    font-size: 0.875rem;
    padding: 0.3rem 0 0.3rem 1.1rem;
    position: relative;
    color: var(--ink);
  }
  .key-points li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.75rem;
    top: 0.38rem;
  }

  .draft-response {
    background: var(--paper);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: 4px;
    padding: 0.85rem 1rem;
    font-size: 0.85rem;
    line-height: 1.7;
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
  }

  .copy-btn {
    margin-top: 0.5rem;
    font-size: 0.72rem;
    padding: 0.3rem 0.75rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .copy-btn.copied { border-color: var(--low); color: var(--low); }

  /* Action box */
  .action-box {
    background: var(--ink);
    color: var(--paper);
    border-radius: 5px;
    padding: 0.85rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
  }
  .action-icon { font-size: 1rem; flex-shrink: 0; }

  /* Escalation banner */
  .escalation-banner {
    margin-top: 0.75rem;
    background: #fff3f0;
    border: 1px solid #f2b8ab;
    border-left: 4px solid var(--urgent);
    border-radius: 4px;
    padding: 0.7rem 1rem;
    font-size: 0.82rem;
    color: #7a2d1a;
    display: flex;
    gap: 0.5rem;
    align-items: flex-start;
  }

  /* Error state */
  .error-box {
    background: #fff3f0;
    border: 1px solid #f2b8ab;
    border-radius: 6px;
    padding: 1.25rem;
    color: #7a2d1a;
    font-size: 0.875rem;
  }

  /* Sentiment tag */
  .sentiment-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
  }
  .sentiment-positive { background: #ebf5e9; color: var(--low); }
  .sentiment-neutral   { background: #e8f0f5; color: var(--accent2); }
  .sentiment-negative  { background: #fdf0ec; color: var(--accent); }
  .sentiment-urgent    { background: #fff3f0; color: var(--urgent); }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 0.75rem 0;
  }

  @media (max-width: 720px) {
    .wrapper { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-mark">SMC</span>
    <span class="logo-tag">AI Triage</span>
  </div>
  <div class="header-right">Strata Management Consultants</div>
</header>

<div class="wrapper">

  <!-- ── LEFT: Input ───────────────────────────────────────── -->
  <div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Client Enquiry</span>
        <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
      </div>
      <div class="panel-body">

        <div class="samples">
          <div class="samples-label">Try a sample</div>
          <div class="pill-grid" id="pill-grid"></div>
        </div>

        <label for="enquiry-text">Paste or type enquiry below</label>
        <textarea id="enquiry-text" placeholder="e.g. Hi, I own a unit at 12 Harbour St and noticed water leaking from the ceiling above my bathroom. Can someone inspect this urgently please?" oninput="updateCount()"></textarea>
        <div class="char-count"><span id="char-count">0</span> / 5000</div>

        <button class="btn btn-primary" id="submit-btn" onclick="submitEnquiry()">
          ⟳ &nbsp;Analyse Enquiry
        </button>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: Results ────────────────────────────────────── -->
  <div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Analysis</span>
        <span id="proc-time" style="font-size:0.75rem;color:var(--muted);"></span>
      </div>

      <!-- Empty state -->
      <div id="empty-state">
        <div class="empty-icon">📋</div>
        <p style="font-size:0.875rem;">Submit an enquiry to see the AI analysis.</p>
      </div>

      <!-- Loading -->
      <div id="loading">
        <div class="spinner"></div>
        <p style="font-size:0.875rem;">Analysing enquiry…</p>
      </div>

      <!-- Results -->
      <div id="results"></div>

    </div>
  </div>

</div>

<script>
const SAMPLES = [
  { label: "New Client",   text: "Hello, I'm a property developer and I have 42 lots in a new complex finishing construction next March. I'd like to discuss strata management services including levies, by-laws, and AGM setup. Could someone call me to discuss rates?" },
  { label: "Maintenance",  text: "Hi there, I live in unit 8 at Greenview Estate. There is a large crack appearing in the external wall beside my balcony. It got worse after last week's rain. This is urgent as I'm concerned it could be a structural issue." },
  { label: "Complaint",    text: "I am absolutely disgusted with the service we have received. I have now emailed four times about the broken gate at the carpark entrance and nothing has been done in THREE months. I am considering escalating this to Fair Trading." },
  { label: "Billing",      text: "Can you please explain my last levy notice? The amount charged was $1,240 which seems much higher than the previous quarter. I didn't receive any notice of a special levy being raised." },
  { label: "General",      text: "Hi, can you tell me if there are any restrictions on keeping a small dog in my unit? The complex is Maplewood Gardens on Smith Street." },
  { label: "Vague/Unclear",text: "lol yea ok so about the thing with the stuff? nobody told me anything. sort it out cheers" },
];

// Populate sample pills
const grid = document.getElementById('pill-grid');
SAMPLES.forEach(s => {
  const p = document.createElement('button');
  p.className = 'pill';
  p.textContent = s.label;
  p.onclick = () => { document.getElementById('enquiry-text').value = s.text; updateCount(); };
  grid.appendChild(p);
});

function updateCount() {
  const len = document.getElementById('enquiry-text').value.length;
  document.getElementById('char-count').textContent = len;
}

function clearForm() {
  document.getElementById('enquiry-text').value = '';
  document.getElementById('char-count').textContent = '0';
  showEmpty();
}

function showEmpty() {
  document.getElementById('empty-state').style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('proc-time').textContent = '';
}

async function submitEnquiry() {
  const text = document.getElementById('enquiry-text').value.trim();
  if (!text) { alert('Please enter an enquiry first.'); return; }

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('loading').style.display = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('proc-time').textContent = '';

  try {
    const resp = await fetch('/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enquiry: text }),
    });
    const data = await resp.json();
    renderResults(data);
  } catch(e) {
    renderError('Network error: ' + e.message);
  } finally {
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('loading').style.display = 'none';
  }
}

function sentimentInfo(s) {
  const map = { positive:'😊', neutral:'😐', negative:'😠', urgent:'🚨' };
  return { icon: map[s]||'😐', cls: 'sentiment-'+s };
}

function confColor(c) {
  if (c >= 0.8) return '#5a7a55';
  if (c >= 0.6) return '#b89a4e';
  return '#c8552a';
}

function renderResults(d) {
  if (d.error && !d.category) { renderError(d.error); return; }

  const conf = Math.round((d.confidence||0)*100);
  const si = sentimentInfo(d.sentiment||'neutral');
  const esc = d.escalate;
  const prio = d.priority||'low';

  document.getElementById('proc-time').textContent = d.processing_time ? `${d.processing_time}s` : '';

  const keyPointsHtml = (d.key_points||[]).map(k=>`<li>${esc_(k)}</li>`).join('');

  const html = `
    <div class="category-hero">
      <div class="category-badge">${esc_(d.category_label||'Unknown')}</div>
      <span class="priority-chip priority-${prio}">${prio}</span>
      <span class="sentiment-tag ${si.cls}">${si.icon} ${esc_(d.sentiment||'neutral')}</span>
    </div>

    <div class="meta-row">
      <div class="meta-item">→ <strong>${esc_(d.team||'—')}</strong></div>
      <div class="meta-item">SLA: <strong>${esc_(d.sla||'—')}</strong></div>
      <div class="meta-item">As of <strong>${esc_(d.timestamp||'—')}</strong></div>
    </div>

    <div class="conf-wrap">
      <div class="conf-label">
        <span>AI Confidence</span>
        <span style="color:${confColor(d.confidence||0)};font-weight:700;">${conf}%</span>
      </div>
      <div class="conf-bar-bg">
        <div class="conf-bar-fill" style="width:${conf}%;background:${confColor(d.confidence||0)};"></div>
      </div>
      ${d.confidence_reason ? `<div class="conf-reason">${esc_(d.confidence_reason)}</div>` : ''}
    </div>

    ${d.error ? `<div class="result-section"><div class="error-box">⚠️ ${esc_(d.error)}</div></div>` : ''}

    <div class="result-section">
      <div class="section-label">Summary</div>
      <p>${esc_(d.summary||'—')}</p>
    </div>

    ${keyPointsHtml ? `<div class="result-section">
      <div class="section-label">Key Points</div>
      <ul class="key-points">${keyPointsHtml}</ul>
    </div>` : ''}

    <div class="result-section">
      <div class="section-label">Recommended Action</div>
      <div class="action-box">
        <span class="action-icon">→</span>
        <span>${esc_(d.recommended_action||'—')}</span>
      </div>
      ${esc ? `<div class="escalation-banner">
        <span>🚨</span>
        <span><strong>Escalation flagged.</strong> ${esc_(d.escalation_reason||'Requires immediate attention.')}</span>
      </div>` : ''}
    </div>

    <div class="result-section">
      <div class="section-label">Draft Response</div>
      <div class="draft-response" id="draft-text">${esc_(d.suggested_response||'—')}</div>
      <button class="copy-btn" id="copy-btn" onclick="copyDraft()">Copy to clipboard</button>
    </div>
  `;

  const el = document.getElementById('results');
  el.innerHTML = html;
  el.style.display = 'block';
}

function renderError(msg) {
  const el = document.getElementById('results');
  el.innerHTML = `<div class="panel-body"><div class="error-box">⚠️ ${esc_(msg)}</div></div>`;
  el.style.display = 'block';
}

function esc_(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyDraft() {
  const text = document.getElementById('draft-text')?.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy to clipboard'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
